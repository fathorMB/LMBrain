name: Build installers

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  version:
    name: Release gate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      changed: ${{ steps.version.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify version alignment and detect a release
        id: version
        shell: bash
        run: |
          node scripts/check-version.mjs
          current_version="$(node -p "require('./package.json').version")"
          previous_version=""
          if git show HEAD^:package.json > "$RUNNER_TEMP/previous-package.json" 2>/dev/null; then
            previous_version="$(node -p "JSON.parse(require('fs').readFileSync(process.env.RUNNER_TEMP + '/previous-package.json')).version")"
          fi
          echo "version=$current_version" >> "$GITHUB_OUTPUT"
          if [ "$current_version" != "$previous_version" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Preparing LMBrain v$current_version (previous: ${previous_version:-none})."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "LMBrain remains at v$current_version; skipping installer build and release."
          fi

  build:
    needs: version
    if: needs.version.outputs.changed == 'true'
    name: ${{ matrix.name }} installer
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            args: --bundles nsis,msi
            artifact: |
              target/release/bundle/nsis/*.exe
              target/release/bundle/msi/*.msi
          - name: Linux
            os: ubuntu-22.04
            args: --bundles appimage,deb
            artifact: |
              target/release/bundle/appimage/*.AppImage
              target/release/bundle/deb/*.deb
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify app and kit version alignment
        run: node scripts/check-version.mjs
      - name: Lint and test
        run: |
          pnpm lint
          pnpm test
      - name: Run Rust tests
        run: cargo test
      - name: Build MCP server
        run: cargo build --release -p lmbrain-mcp
      - name: Build installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.version.outputs.version }}
          ARTIFACT_PATTERNS: ${{ matrix.artifact }}
        shell: pwsh
        run: |
          $tag = "v$env:VERSION"
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title "LMBrain v$env:VERSION" --generate-notes
            if ($LASTEXITCODE -ne 0) {
              gh release view $tag *> $null
              if ($LASTEXITCODE -ne 0) {
                throw "Failed to create or find release $tag"
              }
            }
          }

          $assets = @()
          $patterns = $env:ARTIFACT_PATTERNS -split "`n" | ForEach-Object { $_.Trim() } | Where-Object { $_ }
          foreach ($pattern in $patterns) {
            $assets += Get-ChildItem -Path $pattern -File | ForEach-Object { $_.FullName }
          }

          $mcp = "target/release/lmbrain-mcp"
          if ($env:RUNNER_OS -eq "Windows") {
            $mcp = "$mcp.exe"
          }
          if (Test-Path $mcp) {
            $assets += (Resolve-Path $mcp).Path
          }

          if ($assets.Count -eq 0) {
            throw "No release assets found"
          }
          gh release upload $tag @assets --clobber
