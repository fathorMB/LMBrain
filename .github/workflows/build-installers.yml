name: Build installers

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  version:
    name: Release gate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      changed: ${{ steps.version.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify version alignment and detect a release
        id: version
        shell: bash
        run: |
          node scripts/check-version.mjs
          current_version="$(node -p "require('./package.json').version")"
          previous_version=""
          if git show HEAD^:package.json > "$RUNNER_TEMP/previous-package.json" 2>/dev/null; then
            previous_version="$(node -p "JSON.parse(require('fs').readFileSync(process.env.RUNNER_TEMP + '/previous-package.json')).version")"
          fi
          echo "version=$current_version" >> "$GITHUB_OUTPUT"
          if [ "$current_version" != "$previous_version" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Preparing LMBrain v$current_version (previous: ${previous_version:-none})."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "LMBrain remains at v$current_version; skipping installer build and release."
          fi

  build:
    needs: version
    if: needs.version.outputs.changed == 'true'
    name: ${{ matrix.name }} installer
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            args: --bundles nsis,msi
            artifact: |
              target/release/bundle/nsis/*.exe
              target/release/bundle/msi/*.msi
          - name: Linux
            os: ubuntu-22.04
            args: --bundles appimage,deb
            artifact: |
              target/release/bundle/appimage/*.AppImage
              target/release/bundle/deb/*.deb
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify app and kit version alignment
        run: node scripts/check-version.mjs
      - name: Lint and test
        run: |
          pnpm lint
          pnpm test
      - name: Run Rust tests
        run: cargo test
      - name: Build MCP server
        run: cargo build --release -p lmbrain-mcp
      - name: Build installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: LMBrain-v${{ needs.version.outputs.version }}-${{ matrix.name }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error
      - name: Upload MCP server
        uses: actions/upload-artifact@v4
        with:
          name: lmbrain-mcp-${{ matrix.name }}
          path: target/release/lmbrain-mcp${{ runner.os == 'Windows' && '.exe' || '' }}
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: [version, build]
    if: needs.version.outputs.changed == 'true' && needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          pattern: LMBrain-v${{ needs.version.outputs.version }}-*
          path: release-assets
          merge-multiple: true
      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.version.outputs.version }}
        shell: bash
        run: |
          tag="v$VERSION"
          mapfile -d '' assets < <(find release-assets -type f -print0)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets were downloaded." >&2
            exit 1
          fi
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --clobber
          else
            gh release create "$tag" "${assets[@]}" --title "LMBrain v$VERSION" --generate-notes
          fi
